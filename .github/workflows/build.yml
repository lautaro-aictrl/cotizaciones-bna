name: Compilar CotizacionesBNA.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # permite compilar manualmente desde GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install pyinstaller pillow pystray requests beautifulsoup4

      - name: Generar HTML embebido
        run: |
          python -c "
          import base64
          with open('tc-monitor-bna.html','rb') as f:
              data = f.read()
          b64 = base64.b64encode(data).decode()
          with open('html_embedded.py','w') as f:
              f.write('HTML_B64 = \"' + b64 + '\"' + chr(10))
          print('HTML embebido OK -', len(data), 'bytes')
          "

      - name: Compilar .exe
        run: |
          pyinstaller --onefile --noconsole --name "CotizacionesBNA" app_launcher.py --clean --noconfirm

      - name: Subir .exe como descargable
        uses: actions/upload-artifact@v4
        with:
          name: CotizacionesBNA
          path: dist/CotizacionesBNA.exe
          retention-days: 90
